name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Wrapper İndir
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" || \
          wget -O gradle/wrapper/gradle-wrapper.jar \
            "https://search.maven.org/remotecontent?filepath=org/gradle/gradle-wrapper/8.2/gradle-wrapper-8.2.jar"

      - name: İzin Ver
        run: chmod +x gradlew

      - name: APK Derle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: FTPManager-APK
          path: app/build/outputs/apk/debug/app-debug.apk
